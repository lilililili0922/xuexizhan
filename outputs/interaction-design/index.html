<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>学习站交互设计稿</title>
    <style>
      body {
        margin: 0;
        color: #14213d;
        background: #f4fbff;
        font-family: "Avenir Next", "PingFang SC", sans-serif;
      }
      main {
        width: min(1080px, calc(100% - 32px));
        margin: 0 auto;
        padding: 42px 0;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 36px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 14px;
        margin-top: 24px;
      }
      section {
        min-height: 190px;
        padding: 18px;
        border: 1px solid #dce3ee;
        border-radius: 8px;
        background: #fff;
      }
      h2 {
        margin: 0 0 10px;
        font-size: 20px;
      }
      p,
      li {
        line-height: 1.7;
      }
      a {
        color: #2563eb;
        font-weight: 800;
      }
      @media (max-width: 820px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>学习站 H5 交互设计稿</h1>
      <p>本稿对应已实现页面：学生端首页、老师后台、早上签到表、学生心声和课程入口。</p>
      <p>
        本地运行后查看：
        <a href="http://localhost:3000">学生端</a>
        ·
        <a href="http://localhost:3000/admin">老师后台</a>
      </p>
      <div class="grid">
        <section>
          <h2>学生首页</h2>
          <ul>
            <li>今日课程</li>
            <li>早上签到表</li>
            <li>本周课程</li>
            <li>快捷入口</li>
          </ul>
        </section>
        <section>
          <h2>签到表</h2>
          <ul>
            <li>看清已到学生</li>
            <li>汇总迟到人数</li>
            <li>列出迟到名单</li>
            <li>展示备注原因</li>
          </ul>
        </section>
        <section>
          <h2>老师后台</h2>
          <ul>
            <li>维护每日内容</li>
            <li>录入签到状态</li>
            <li>新增课程</li>
            <li>审核学生心声</li>
          </ul>
        </section>
      </div>
    </main>
  </body>
</html>
